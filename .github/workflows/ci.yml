# SPDX-License-Identifier: MPL-2.0

# Lint, test, build and release
#
# The jobs are layed out in a way that prioritizes reducing total spent resources (CPU time).
# This means that we don't parallelize as much as we could.
# But at the same time we parallelize some work work to reduce the total duration.
# It's a balance between the two.
name: CI
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Lint, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Install dependencies
        # Ignore Scripts for security
        run: npm ci --ignore-scripts
      - name: Audit (level=high)
        run: npm audit --audit-level=high
      - name: Build frontend
        run: |
          NODE_ENV=production npm run all
      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  go-verify:
    name: Go Vet and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Tidy Go modules
        run: go mod tidy
      - name: Create placeholder dist directory
        run: |
          mkdir -p dist
          touch dist/placeholder
      - name: Run go vet
        run: go vet ./...
      - name: Run go test
        run: go test ./...

  build-linux:
    name: Build Linux Binaries
    needs: [go-verify, frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    # Keep in sync with Dockerfile
    container: debian:13.4-slim@sha256:109e2c65005bf160609e4ba6acf7783752f8502ad218e298253428690b9eaa4b
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y wget git build-essential
          # Install cross-compilation tools for arm64
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download frontend build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: frontend-dist
          path: dist/

      - name: Build Linux binaries
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          mkdir -p bin
          # Build amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -o bin/shaper-linux-amd64 -ldflags="-w -s -X 'main.Version=$VERSION'"
          # Build arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc go build -o bin/shaper-linux-arm64 -ldflags="-w -s -X 'main.Version=$VERSION'"

      - name: Generate checksums
        run: |
          cd bin
          sha256sum shaper-linux-* > checksums-linux.txt

      - name: Upload Linux binaries and checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-binaries
          path: |
            bin/shaper-linux-*
            bin/checksums-linux.txt
          retention-days: 1

  build-darwin:
    name: Build macOS Binaries
    needs: [go-verify, frontend-build]
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
          # Wait for installation to complete
          while ! xcode-select -p; do
            sleep 5
          done

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download frontend build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: frontend-dist
          path: dist/

      - name: Build macOS binaries
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          mkdir -p bin
          # Build amd64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -o bin/shaper-darwin-amd64 -ldflags="-X 'main.Version=$VERSION'"
          # Build arm64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -o bin/shaper-darwin-arm64 -ldflags="-X 'main.Version=$VERSION'"

      - name: Generate checksums
        run: |
          cd bin
          shasum -a 256 shaper-darwin-* > checksums-darwin.txt

      - name: Upload macOS binaries and checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: darwin-binaries
          path: |
            bin/shaper-darwin-*
            bin/checksums-darwin.txt
          retention-days: 1

  release:
    name: Create Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Linux binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: linux-binaries
          path: bin

      - name: Download macOS binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: darwin-binaries
          path: bin

      - name: Combine checksums
        run: |
          cd bin
          cat checksums-*.txt | sort | uniq > SHA256SUMS
          rm checksums-*.txt

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            bin/shaper-linux-*
            bin/shaper-darwin-*
            bin/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: linux-binaries
          path: bin/

      - name: Make binaries executable
        run: chmod +x bin/shaper-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          # Split version into components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MAJOR=$MAJOR" >> $GITHUB_OUTPUT
          echo "MINOR=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            taleshape/shaper:latest
            taleshape/shaper:${{ steps.version.outputs.VERSION }}
            taleshape/shaper:${{ steps.version.outputs.MINOR }}
            taleshape/shaper:${{ steps.version.outputs.MAJOR }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ github.event.release.published_at || github.event.head_commit.timestamp }}

  npm-publish:
    name: Publish to npm
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: linux-binaries
          path: bin

      - name: Download macOS binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: darwin-binaries
          path: bin

      - name: Combine checksums
        run: |
          cat bin/checksums-*.txt | sort | uniq > npm-package/bin/SHA256SUMS

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Update npm package version
        run: |
          cd npm-package
          npm version $(echo ${{ github.ref_name }} | sed 's/^v//') --no-git-tag-version

      - name: Publish to npm
        run: |
          cd npm-package
          # Use --provenance for OIDC-linked builds.
          # Note: Requires Trusted Publishing setup on npmjs.com.
          # If still using NPM_TOKEN, it will use that for auth but still generate provenance.
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-publish:
    name: Publish to PyPI
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: linux-binaries
          path: bin

      - name: Download macOS binaries and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.1.1
        with:
          name: darwin-binaries
          path: bin

      - name: Combine checksums
        run: |
          mkdir -p pip-package/shaper_pkg/bin
          cat bin/checksums-*.txt | sort | uniq > pip-package/shaper_pkg/bin/SHA256SUMS

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Update Python package version
        run: |
          cd pip-package
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          # Update version in pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          # Update version in __init__.py
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" shaper_pkg/__init__.py

      - name: Build Python package
        run: |
          cd pip-package
          pip install wheel
          # Build sdist (source distribution)
          python -m build --sdist

          # Build platform-specific wheels
          # We use specific platform tags to ensure PyPI serves the right binary
          platforms=(
            "linux-amd64:manylinux2014_x86_64"
            "linux-arm64:manylinux2014_aarch64"
            "darwin-amd64:macosx_10_9_x86_64"
            "darwin-arm64:macosx_11_0_arm64"
          )

          for p in "${platforms[@]}"; do
            binary_suffix="${p%%:*}"
            plat_name="${p#*:}"

            echo "Building wheel for $plat_name..."
            # Copy the binary to the package directory
            cp "../bin/shaper-$binary_suffix" shaper_pkg/bin/shaper
            chmod +x shaper_pkg/bin/shaper

            # Create the wheel with the platform tag
            python setup.py bdist_wheel --plat-name "$plat_name"

            # Clean up for the next platform
            rm -rf build/
            rm shaper_pkg/bin/shaper
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1.12.4
        with:
          packages-dir: pip-package/dist/
          # No token needed if Trusted Publishing is set up.
          # Fallback to token if secret is provided.
          password: ${{ secrets.PYPI_API_TOKEN }}